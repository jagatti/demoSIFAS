<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ボルラン！</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="style.css">
</head>
  
<body>
<div id="rotateMsg">横画面にしてください</div>
<img id="bgimg" src="bg.jpg" style="display:none;">
<canvas id="game"></canvas>
<button id="startBtn">S.T.A.R.T!!</button>
<button id="retryBtn">タイトルへ</button>
<button id="pauseBtn">⏸</button>
<img id="titleImg" src="title1.png" style="display:none;">
<img id="jacketImg" src="jacket_SStar.png" style="display:none;">
<img id="jacketTLaby" src="jacket_Tlabyrinth.png" style="display:none;">
<img id="jacketBetrayal" src="jacket_betrayal.png" style="display:none;">
<audio id="titleBgm" src="KIRAKIRA.mp3" preload="auto" loop></audio>
<audio id="bgm" src="shining_star.mp3" preload="auto" loop></audio>
<script type="module" src="main.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg))
        .catch(err => console.error('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
